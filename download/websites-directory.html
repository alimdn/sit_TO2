<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل النشاطات والمحلات</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap');

        :root {
            --tier1-accent: #f7971e;
            --tier1-glow: rgba(247, 151, 30, 0.3);
            --tier2-accent: #00d2ff;
            --tier2-glow: rgba(0, 210, 255, 0.3);
            --tier3-accent: #52d681;
            --tier3-glow: rgba(82, 214, 129, 0.3);
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-hover: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --danger: #ff4757;
            --success: #2ed573;
            --overlay: rgba(0, 0, 0, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cairo', sans-serif;
            background: #0a0a1a;
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-animation {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; overflow: hidden;
        }
        .bg-animation .orb {
            position: absolute; border-radius: 50%; filter: blur(80px);
            opacity: 0.12; animation: float 20s ease-in-out infinite;
        }
        .bg-animation .orb:nth-child(1) { width: 600px; height: 600px; background: #f7971e; top: -200px; right: -200px; }
        .bg-animation .orb:nth-child(2) { width: 500px; height: 500px; background: #00d2ff; bottom: -150px; left: -150px; animation-delay: -7s; }
        .bg-animation .orb:nth-child(3) { width: 400px; height: 400px; background: #52d681; top: 50%; left: 50%; animation-delay: -14s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(100px, -50px) scale(1.1); }
            50% { transform: translate(-50px, 100px) scale(0.9); }
            75% { transform: translate(50px, 50px) scale(1.05); }
        }

        /* Header */
        header {
            position: relative; z-index: 10; padding: 24px 30px;
            background: rgba(10, 10, 26, 0.85); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
        }
        .header-content {
            max-width: 1600px; margin: 0 auto;
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 16px;
        }
        .logo { display: flex; align-items: center; gap: 14px; }
        .logo-icon {
            width: 50px; height: 50px;
            background: linear-gradient(135deg, var(--tier1-accent), #ff6b6b);
            border-radius: 14px; display: flex; align-items: center; justify-content: center;
            font-size: 26px; box-shadow: 0 4px 20px rgba(247, 151, 30, 0.3);
        }
        .logo h1 {
            font-size: 26px; font-weight: 800;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .logo p { font-size: 13px; color: var(--text-secondary); font-weight: 300; }
        .header-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

        .search-box { position: relative; }
        .search-box input {
            background: rgba(255,255,255,0.08); border: 1px solid var(--border-color);
            border-radius: 12px; padding: 10px 40px 10px 16px; color: white;
            font-family: 'Cairo'; font-size: 14px; width: 260px; transition: all 0.3s;
        }
        .search-box input:focus {
            outline: none; border-color: var(--tier1-accent);
            box-shadow: 0 0 20px rgba(247,151,30,0.15); background: rgba(255,255,255,0.12);
        }
        .search-box input::placeholder { color: rgba(255,255,255,0.4); }
        .search-box .search-icon { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.4); }

        .btn {
            padding: 10px 20px; border: none; border-radius: 12px;
            font-family: 'Cairo'; font-size: 14px; font-weight: 600;
            cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--tier1-accent), #ffd200);
            color: #1a1a2e; box-shadow: 0 4px 15px rgba(247,151,30,0.3);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(247,151,30,0.4); }
        .btn-secondary { background: rgba(255,255,255,0.08); color: white; border: 1px solid var(--border-color); }
        .btn-secondary:hover { background: rgba(255,255,255,0.15); }
        .btn-reset { background: rgba(255,71,87,0.15); color: #ff4757; border: 1px solid rgba(255,71,87,0.3); }
        .btn-reset:hover { background: rgba(255,71,87,0.25); }

        /* Stats Bar */
        .stats-bar {
            position: relative; z-index: 10; padding: 14px 30px;
            background: rgba(10,10,26,0.5); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: center; gap: 30px; flex-wrap: wrap;
        }
        .stat-item { display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .stat-dot { width: 10px; height: 10px; border-radius: 50%; }
        .stat-dot.gold { background: var(--tier1-accent); box-shadow: 0 0 10px var(--tier1-glow); }
        .stat-dot.blue { background: var(--tier2-accent); box-shadow: 0 0 10px var(--tier2-glow); }
        .stat-dot.green { background: var(--tier3-accent); box-shadow: 0 0 10px var(--tier3-glow); }
        .stat-count { font-weight: 700; font-size: 18px; }
        .stat-label { color: var(--text-secondary); }

        /* Main Content */
        main { position: relative; z-index: 10; max-width: 1600px; margin: 0 auto; padding: 25px 30px; }

        /* Tier Sections */
        .tier-section { margin-bottom: 35px; border-radius: 20px; overflow: hidden; transition: all 0.3s; }
        .tier-header {
            padding: 18px 28px; display: flex; justify-content: space-between;
            align-items: center; cursor: pointer; position: relative; overflow: hidden;
        }
        .tier1 .tier-header { background: linear-gradient(135deg, rgba(247,151,30,0.15), rgba(255,210,0,0.05)); }
        .tier2 .tier-header { background: linear-gradient(135deg, rgba(0,210,255,0.15), rgba(0,150,255,0.05)); }
        .tier3 .tier-header { background: linear-gradient(135deg, rgba(82,214,129,0.15), rgba(46,213,115,0.05)); }

        .tier-title-area { display: flex; align-items: center; gap: 14px; }
        .tier-badge {
            width: 48px; height: 48px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; font-weight: 800;
        }
        .tier1 .tier-badge { background: linear-gradient(135deg, var(--tier1-accent), #ffd200); color: #1a1a2e; box-shadow: 0 4px 15px var(--tier1-glow); }
        .tier2 .tier-badge { background: linear-gradient(135deg, var(--tier2-accent), #0099ff); color: #1a1a2e; box-shadow: 0 4px 15px var(--tier2-glow); }
        .tier3 .tier-badge { background: linear-gradient(135deg, var(--tier3-accent), #2ed573); color: #1a1a2e; box-shadow: 0 4px 15px var(--tier3-glow); }

        .tier-title h2 { font-size: 20px; font-weight: 700; }
        .tier-title p { font-size: 12px; color: var(--text-secondary); }
        .tier1 .tier-title h2 { color: var(--tier1-accent); }
        .tier2 .tier-title h2 { color: var(--tier2-accent); }
        .tier3 .tier-title h2 { color: var(--tier3-accent); }

        .tier-count { background: rgba(255,255,255,0.08); padding: 6px 16px; border-radius: 20px; font-size: 13px; color: var(--text-secondary); }
        .tier-toggle { font-size: 20px; color: var(--text-secondary); transition: transform 0.3s; }
        .tier-section.collapsed .tier-toggle { transform: rotate(180deg); }
        .tier-section.collapsed .tier-grid { display: none; }

        /* Website Grid */
        .tier-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 14px; padding: 22px;
        }
        .tier1 .tier-grid { background: rgba(15,12,41,0.4); }
        .tier2 .tier-grid { background: rgba(26,26,46,0.4); }
        .tier3 .tier-grid { background: rgba(27,27,47,0.4); }

        /* Website Card */
        .website-card {
            background: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 16px; padding: 16px; transition: all 0.3s;
            position: relative; overflow: hidden;
        }
        .website-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0;
            height: 3px; opacity: 0; transition: opacity 0.3s;
        }
        .tier1 .website-card::before { background: linear-gradient(90deg, var(--tier1-accent), #ffd200); }
        .tier2 .website-card::before { background: linear-gradient(90deg, var(--tier2-accent), #0099ff); }
        .tier3 .website-card::before { background: linear-gradient(90deg, var(--tier3-accent), #2ed573); }

        .website-card:hover { background: var(--card-hover); transform: translateY(-3px); border-color: rgba(255,255,255,0.2); }
        .website-card:hover::before { opacity: 1; }

        .card-top { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 10px; }

        .website-icon {
            width: 44px; height: 44px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; flex-shrink: 0;
        }
        .tier1 .website-icon { background: linear-gradient(135deg, rgba(247,151,30,0.25), rgba(255,210,0,0.08)); border: 1px solid rgba(247,151,30,0.25); }
        .tier2 .website-icon { background: linear-gradient(135deg, rgba(0,210,255,0.25), rgba(0,150,255,0.08)); border: 1px solid rgba(0,210,255,0.25); }
        .tier3 .website-icon { background: linear-gradient(135deg, rgba(82,214,129,0.25), rgba(46,213,115,0.08)); border: 1px solid rgba(82,214,129,0.25); }

        .website-info { flex: 1; min-width: 0; }
        .website-name { font-size: 15px; font-weight: 700; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .website-category { font-size: 11px; color: var(--text-secondary); display: flex; align-items: center; gap: 4px; }
        .website-desc { font-size: 11px; color: rgba(255,255,255,0.4); margin-bottom: 8px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .website-url { font-size: 11px; color: rgba(255,255,255,0.4); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; direction: ltr; text-align: right; margin-bottom: 10px; }

        .card-actions { display: flex; gap: 5px; flex-wrap: wrap; position: relative; }

        .card-btn {
            padding: 5px 9px; border: 1px solid var(--border-color); border-radius: 8px;
            background: rgba(255,255,255,0.05); color: var(--text-secondary);
            font-size: 11px; font-family: 'Cairo'; cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; gap: 3px;
        }
        .card-btn:hover { background: rgba(255,255,255,0.15); color: white; }
        .card-btn.copy-btn:hover { border-color: var(--tier2-accent); color: var(--tier2-accent); }
        .card-btn.edit-btn:hover { border-color: var(--tier1-accent); color: var(--tier1-accent); }
        .card-btn.move-btn:hover { border-color: var(--tier3-accent); color: var(--tier3-accent); }
        .card-btn.delete-btn:hover { border-color: var(--danger); color: var(--danger); }
        .card-btn.visit-btn:hover { border-color: var(--success); color: var(--success); }

        /* Rating Stars */
        .stars { font-size: 12px; letter-spacing: 1px; margin-bottom: 8px; }
        .stars .filled { color: #ffd200; }
        .stars .empty { color: rgba(255,255,255,0.15); }

        /* Move Dropdown */
        .move-dropdown {
            position: absolute; bottom: calc(100% + 5px); right: 0;
            background: #1e1e3a; border: 1px solid var(--border-color); border-radius: 12px;
            padding: 8px; z-index: 100; min-width: 160px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); display: none;
        }
        .move-dropdown.show { display: block; }
        .move-dropdown-item {
            padding: 8px 12px; border-radius: 8px; cursor: pointer;
            font-size: 13px; transition: all 0.2s; display: flex; align-items: center; gap: 8px;
        }
        .move-dropdown-item:hover { background: rgba(255,255,255,0.1); }
        .move-dropdown-item.to-tier1 { color: var(--tier1-accent); }
        .move-dropdown-item.to-tier2 { color: var(--tier2-accent); }
        .move-dropdown-item.to-tier3 { color: var(--tier3-accent); }

        /* Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--overlay); backdrop-filter: blur(10px);
            z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-overlay.active { display: flex; }

        .modal {
            background: #1a1a35; border: 1px solid var(--border-color);
            border-radius: 20px; width: 100%; max-width: 520px; padding: 28px;
            animation: modalIn 0.3s ease; max-height: 90vh; overflow-y: auto;
        }
        @keyframes modalIn {
            from { transform: scale(0.9) translateY(20px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }
        .modal h3 { font-size: 20px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 5px; font-weight: 600; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 10px 14px; background: rgba(255,255,255,0.06);
            border: 1px solid var(--border-color); border-radius: 10px;
            color: white; font-family: 'Cairo'; font-size: 14px; transition: all 0.3s;
        }
        .form-group textarea { resize: vertical; min-height: 60px; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none; border-color: var(--tier1-accent);
            box-shadow: 0 0 15px rgba(247,151,30,0.15);
        }
        .form-group select option { background: #1a1a35; color: white; }

        .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
        .modal-actions .btn { flex: 1; justify-content: center; padding: 12px; }

        /* Toast */
        .toast-container {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 2000; display: flex; flex-direction: column; gap: 10px; align-items: center;
        }
        .toast {
            background: #1e1e3a; border: 1px solid var(--border-color); border-radius: 12px;
            padding: 12px 24px; font-size: 14px; font-family: 'Cairo';
            animation: toastIn 0.3s ease, toastOut 0.3s ease 2.5s forwards;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 8px;
        }
        .toast.success { border-color: var(--success); }
        .toast.info { border-color: var(--tier2-accent); }

        @keyframes toastIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

        /* Drag & Drop */
        .website-card.dragging { opacity: 0.5; transform: scale(0.95); }
        .tier-grid.drag-over { background: rgba(255,255,255,0.05) !important; outline: 2px dashed var(--tier2-accent); outline-offset: -4px; }

        /* Category tag colors */
        .cat-tag { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 600; }
        .cat-halqa { background: rgba(247,151,30,0.2); color: #f7971e; }
        .cat-clinic { background: rgba(0,210,255,0.2); color: #00d2ff; }
        .cat-dental { background: rgba(255,107,107,0.2); color: #ff6b6b; }
        .cat-farm { background: rgba(82,214,129,0.2); color: #52d681; }
        .cat-fruit { background: rgba(255,165,0,0.2); color: #ffa500; }
        .cat-grocery { background: rgba(255,210,0,0.2); color: #ffd200; }
        .cat-restaurant { background: rgba(240,98,146,0.2); color: #f06292; }
        .cat-cafe { background: rgba(161,140,209,0.2); color: #a18cd1; }
        .cat-pharmacy { background: rgba(0,230,118,0.2); color: #00e676; }
        .cat-car { background: rgba(100,181,246,0.2); color: #64b5f6; }
        .cat-laundry { background: rgba(77,208,225,0.2); color: #4dd0e1; }
        .cat-flower { background: rgba(240,147,251,0.2); color: #f093fb; }
        .cat-book { background: rgba(255,183,77,0.2); color: #ffb74d; }
        .cat-beauty { background: rgba(236,64,122,0.2); color: #ec407a; }
        .cat-realestate { background: rgba(38,198,218,0.2); color: #26c6da; }
        .cat-transport { background: rgba(92,107,192,0.2); color: #5c6bc0; }
        .cat-education { background: rgba(255,138,101,0.2); color: #ff8a65; }
        .cat-bakery { background: rgba(215,204,200,0.2); color: #d7ccc8; }
        .cat-home { background: rgba(129,199,132,0.2); color: #81c784; }
        .cat-electronics { background: rgba(66,165,245,0.2); color: #42a5f5; }
        .cat-clothes { background: rgba(171,71,188,0.2); color: #ab47bc; }
        .cat-sport { background: rgba(76,175,80,0.2); color: #4caf50; }
        .cat-photo { background: rgba(255,112,67,0.2); color: #ff7043; }
        .cat-pet { background: rgba(255,213,79,0.2); color: #ffd54f; }
        .cat-tailor { background: rgba(179,157,219,0.2); color: #b39ddb; }
        .cat-plumber { background: rgba(77,182,172,0.2); color: #4db6ac; }
        .cat-electrician { background: rgba(255,235,59,0.2); color: #ffeb3b; }
        .cat-carpet { background: rgba(188,170,164,0.2); color: #bcaaa4; }
        .cat-optics { background: rgba(3,169,244,0.2); color: #03a9f4; }

        .empty-state { text-align: center; padding: 40px; color: var(--text-secondary); font-size: 14px; }

        /* Responsive */
        @media (max-width: 768px) {
            header { padding: 16px; }
            .header-content { flex-direction: column; align-items: stretch; }
            .search-box input { width: 100%; }
            main { padding: 16px; }
            .tier-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); padding: 14px; gap: 10px; }
            .stats-bar { gap: 15px; padding: 12px 16px; }
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }
    </style>
</head>
<body>

<div class="bg-animation">
    <div class="orb"></div><div class="orb"></div><div class="orb"></div>
</div>

<div class="toast-container" id="toastContainer"></div>

<header>
    <div class="header-content">
        <div class="logo">
            <div class="logo-icon">&#127978;</div>
            <div>
                <h1>دليل النشاطات والمحلات</h1>
                <p>أكثر من 100 نشاط ومحل مصنف حسب الجودة والتقييم</p>
            </div>
        </div>
        <div class="header-actions">
            <div class="search-box">
                <span class="search-icon">&#128269;</span>
                <input type="text" id="searchInput" placeholder="ابحث عن نشاط أو محل..." oninput="filterWebsites()">
            </div>
            <select class="btn btn-secondary" id="categoryFilter" onchange="filterWebsites()" style="cursor:pointer;">
                <option value="">كل الأنشطة</option>
            </select>
            <button class="btn btn-primary" onclick="openAddModal()">+ إضافة نشاط</button>
            <button class="btn btn-reset" onclick="resetData()">&#128260; إعادة تعيين</button>
        </div>
    </div>
</header>

<div class="stats-bar">
    <div class="stat-item">
        <span class="stat-dot gold"></span>
        <span class="stat-count" id="tier1Count">0</span>
        <span class="stat-label">المميزة</span>
    </div>
    <div class="stat-item">
        <span class="stat-dot blue"></span>
        <span class="stat-count" id="tier2Count">0</span>
        <span class="stat-label">الجيدة جداً</span>
    </div>
    <div class="stat-item">
        <span class="stat-dot green"></span>
        <span class="stat-count" id="tier3Count">0</span>
        <span class="stat-label">الجيدة</span>
    </div>
    <div class="stat-item">
        <span class="stat-count" id="totalCount" style="color:#ffd200;">0</span>
        <span class="stat-label">إجمالي الأنشطة</span>
    </div>
</div>

<main id="mainContent"></main>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
    <div class="modal">
        <h3 id="modalTitle">&#10010; إضافة نشاط جديد</h3>
        <div class="form-group">
            <label>اسم النشاط / المحل</label>
            <input type="text" id="siteName" placeholder="مثال: صالون الأناقة">
        </div>
        <div class="form-group">
            <label>الموقع الإلكتروني (اختياري)</label>
            <input type="url" id="siteUrl" placeholder="https://example.com" dir="ltr">
        </div>
        <div class="form-group">
            <label>التصنيف</label>
            <select id="siteCategory">
                <option value="حلاقة وتجميل رجالي">حلاقة وتجميل رجالي</option>
                <option value="عيادة طبية">عيادة طبية</option>
                <option value="عيادة أسنان">عيادة أسنان</option>
                <option value="مزرعة ومنتجات زراعية">مزرعة ومنتجات زراعية</option>

function getStarsHTML(count) {
    let html = '<div class="stars">';
    for (let i = 1; i <= 5; i++) {
        html += i <= count ? '<span class="filled">&#9733;</span>' : '<span class="empty">&#9733;</span>';
    }
    html += '</div>';
    return html;
}

// ========== Render ==========
function render() {
    const main = document.getElementById('mainContent');
    main.innerHTML = '';

    const tiers = [
        { num: 1, name: "الطبقة المميزة", desc: "أعلى تقييم وأفضل سمعة في المنطقة", icon: "&#128142;" },
        { num: 2, name: "الطبقة الجيدة جداً", desc: "محلات ونشاطات ذات جودة عالية وموثوقة", icon: "&#129751;" },
        { num: 3, name: "الطبقة الجيدة", desc: "محلات ونشاطات جيدة وخدمات شعبية", icon: "&#129752;" },
    ];

    const search = document.getElementById('searchInput').value.toLowerCase();
    const catFilter = document.getElementById('categoryFilter').value;

    tiers.forEach(tier => {
        const filtered = websites.filter(w => {
            if (w.tier !== tier.num) return false;
            if (search && !w.name.toLowerCase().includes(search) && !w.url.toLowerCase().includes(search) && !w.category.includes(search) && (!w.desc || !w.desc.toLowerCase().includes(search))) return false;
            if (catFilter && w.category !== catFilter) return false;
            return true;
        });

        const section = document.createElement('div');
        section.className = `tier-section tier${tier.num}`;
        section.id = `tier${tier.num}`;

        section.innerHTML = `
            <div class="tier-header" onclick="toggleTier(${tier.num})">
                <div class="tier-title-area">
                    <div class="tier-badge">${tier.icon}</div>
                    <div class="tier-title">
                        <h2>${tier.name}</h2>
                        <p>${tier.desc}</p>
                    </div>
                </div>
                <div style="display:flex;align-items:center;gap:12px;">
                    <span class="tier-count">${filtered.length} نشاط</span>
                    <span class="tier-toggle">&#9650;</span>
                </div>
            </div>
            <div class="tier-grid" id="tierGrid${tier.num}"
                 ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event, ${tier.num})">
                ${filtered.length === 0 ? '<div class="empty-state">لا توجد أنشطة في هذه الطبقة</div>' : ''}
                ${filtered.map(w => {
                    const globalIdx = websites.indexOf(w);
                    const catClass = categoryClassMap[w.category] || '';
                    const emoji = categoryEmojiMap[w.category] || '&#128204;';
                    return `
                    <div class="website-card" draggable="true" data-index="${globalIdx}"
                         ondragstart="handleDragStart(event, ${globalIdx})" ondragend="handleDragEnd(event)">
                        <div class="card-top">
                            <div class="website-icon">${emoji}</div>
                            <div class="website-info">
                                <div class="website-name">${w.name}</div>
                                <div class="website-category"><span class="cat-tag ${catClass}">${w.category}</span></div>
                            </div>
                        </div>
                        ${w.desc ? `<div class="website-desc">${w.desc}</div>` : ''}
                        ${w.stars ? getStarsHTML(w.stars) : ''}
                        <div class="website-url">${w.url}</div>
                        <div class="card-actions" style="position:relative;">
                            <button class="card-btn visit-btn" onclick="visitSite('${w.url}')">&#128279; زيارة</button>
                            <button class="card-btn copy-btn" onclick="copyUrl('${w.url}')">&#128203; نسخ</button>
                            <button class="card-btn edit-btn" onclick="editSite(${globalIdx})">&#9998; تعديل</button>
                            <button class="card-btn move-btn" onclick="toggleMoveDropdown(event, ${globalIdx})">&#8597; نقل</button>
                            <button class="card-btn delete-btn" onclick="deleteSite(${globalIdx})">&#128465; حذف</button>
                            <div class="move-dropdown" id="moveDropdown${globalIdx}">
                                ${tier.num !== 1 ? `<div class="move-dropdown-item to-tier1" onclick="moveSite(${globalIdx}, 1)">&#128142; المميزة</div>` : ''}
                                ${tier.num !== 2 ? `<div class="move-dropdown-item to-tier2" onclick="moveSite(${globalIdx}, 2)">&#129751; الجيدة جداً</div>` : ''}
                                ${tier.num !== 3 ? `<div class="move-dropdown-item to-tier3" onclick="moveSite(${globalIdx}, 3)">&#129752; الجيدة</div>` : ''}
                            </div>
                        </div>
                    </div>`;
                }).join('')}
            </div>
        `;

        main.appendChild(section);
    });

    updateStats();
    updateCategoryFilter();
    saveData();
}

function updateStats() {
    const t1 = websites.filter(w => w.tier === 1).length;
    const t2 = websites.filter(w => w.tier === 2).length;
    const t3 = websites.filter(w => w.tier === 3).length;
    document.getElementById('tier1Count').textContent = t1;
    document.getElementById('tier2Count').textContent = t2;
    document.getElementById('tier3Count').textContent = t3;
    document.getElementById('totalCount').textContent = t1 + t2 + t3;
}

function updateCategoryFilter() {
    const select = document.getElementById('categoryFilter');
    const current = select.value;
    const categories = [...new Set(websites.map(w => w.category))].sort();
    select.innerHTML = '<option value="">كل الأنشطة</option>';
    categories.forEach(cat => {
        const opt = document.createElement('option');
        opt.value = cat; opt.textContent = cat;
        if (cat === current) opt.selected = true;
        select.appendChild(opt);
    });
}

// ========== Actions ==========
function copyUrl(url) {
    navigator.clipboard.writeText(url).then(() => {
        showToast('تم نسخ الرابط بنجاح!', 'success');
    }).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = url; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('تم نسخ الرابط بنجاح!', 'success');
    });
}

function visitSite(url) {
    if (url && url.startsWith('http')) window.open(url, '_blank');
    else showToast('الرابط غير متاح', 'info');
}

function toggleMoveDropdown(event, index) {
    event.stopPropagation();
    const dropdown = document.getElementById(`moveDropdown${index}`);
    if (openDropdownId !== null && openDropdownId !== index) {
        const prev = document.getElementById(`moveDropdown${openDropdownId}`);
        if (prev) prev.classList.remove('show');
    }
    dropdown.classList.toggle('show');
    openDropdownId = dropdown.classList.contains('show') ? index : null;
}

function moveSite(index, newTier) {
    websites[index].tier = newTier;
    openDropdownId = null;
    const tierNames = { 1: 'المميزة', 2: 'الجيدة جداً', 3: 'الجيدة' };
    showToast(`تم نقل النشاط إلى الطبقة ${tierNames[newTier]}`, 'info');
    render();
}

function deleteSite(index) {
    if (confirm(`هل تريد حذف "${websites[index].name}"؟`)) {
        websites.splice(index, 1);
        showToast('تم حذف النشاط', 'info');
        render();
    }
}

function editSite(index) {
    editingIndex = index;
    const site = websites[index];
    document.getElementById('modalTitle').innerHTML = '&#9998; تعديل النشاط';
    document.getElementById('siteName').value = site.name;
    document.getElementById('siteUrl').value = site.url || '';
    document.getElementById('siteCategory').value = site.category;
    document.getElementById('siteDesc').value = site.desc || '';
    document.getElementById('siteTier').value = site.tier;
    document.getElementById('modalOverlay').classList.add('active');
}

function openAddModal() {
    editingIndex = -1;
    document.getElementById('modalTitle').innerHTML = '&#10010; إضافة نشاط جديد';
    document.getElementById('siteName').value = '';
    document.getElementById('siteUrl').value = '';
    document.getElementById('siteCategory').value = 'حلاقة وتجميل رجالي';
    document.getElementById('siteDesc').value = '';
    document.getElementById('siteTier').value = '3';
    document.getElementById('modalOverlay').classList.add('active');
}

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('active');
    editingIndex = -1;
}

function closeModalOutside(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function saveSite() {
    const name = document.getElementById('siteName').value.trim();
    const url = document.getElementById('siteUrl').value.trim();
    const category = document.getElementById('siteCategory').value;
    const desc = document.getElementById('siteDesc').value.trim();
    const tier = parseInt(document.getElementById('siteTier').value);

    if (!name) { showToast('يرجى إدخال اسم النشاط', 'info'); return; }

    if (editingIndex >= 0) {
        websites[editingIndex] = { ...websites[editingIndex], name, url, category, desc, tier };
        showToast('تم تحديث النشاط بنجاح', 'success');
    } else {
        websites.push({ name, url: url || 'https://', category, desc, tier, stars: 3 });
        showToast('تم إضافة النشاط بنجاح', 'success');
    }
    closeModal();
    render();
}

function toggleTier(num) {
    document.getElementById(`tier${num}`).classList.toggle('collapsed');
}

function filterWebsites() { render(); }

// ========== Drag & Drop ==========
let draggedIndex = null;
function handleDragStart(e, index) { draggedIndex = index; e.target.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; }
function handleDragEnd(e) { e.target.classList.remove('dragging'); document.querySelectorAll('.tier-grid').forEach(g => g.classList.remove('drag-over')); }
function handleDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function handleDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function handleDrop(e, newTier) {
    e.preventDefault(); e.currentTarget.classList.remove('drag-over');
    if (draggedIndex !== null && websites[draggedIndex].tier !== newTier) {
        websites[draggedIndex].tier = newTier;
        const tierNames = { 1: 'المميزة', 2: 'الجيدة جداً', 3: 'الجيدة' };
        showToast(`تم نقل النشاط إلى الطبقة ${tierNames[newTier]}`, 'info');
        render();
    }
    draggedIndex = null;
}

// ========== Toast ==========
function showToast(message, type = 'info') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    const icon = type === 'success' ? '&#10003;' : '&#9432;';
    toast.innerHTML = `<span>${icon}</span> ${message}`;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

// ========== Save/Load ==========
function saveData() { localStorage.setItem('bizWebsitesDir', JSON.stringify(websites)); }
function resetData() {
    if (confirm('هل تريد إعادة تعيين جميع البيانات إلى الحالة الأصلية؟')) {
        localStorage.removeItem('bizWebsitesDir');
        websites = JSON.parse(JSON.stringify(initialWebsites));
        showToast('تم إعادة تعيين البيانات', 'info');
        render();
    }
}

// ========== Events ==========
document.addEventListener('click', (e) => {
    if (openDropdownId !== null && !e.target.closest('.move-btn') && !e.target.closest('.move-dropdown')) {
        const dropdown = document.getElementById(`moveDropdown${openDropdownId}`);
        if (dropdown) dropdown.classList.remove('show');
        openDropdownId = null;
    }
});

document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); document.getElementById('searchInput').focus(); }
});

// ========== Init ==========
render();
</script>
</body>
</html>
